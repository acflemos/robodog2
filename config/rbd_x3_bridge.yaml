# rbd_x3_bridge.yaml
# Pontes de tópicos entre ROS2 e Gazebo Harmonic (ros_gz_bridge)
# Usado em rbd_gz_x3_launch.py

# Relógio da simulação
- ros_topic_name: "clock"
  gz_topic_name: "clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# Estado dos joints (rodas)
# Tópico com namespace de modelo — OdometryPublisher e JointStatePublisher
# publicam em /model/<nome>/... no Gazebo Harmonic (não em tópicos globais)
- ros_topic_name: "joint_states"
  gz_topic_name: "/model/rosmaster_x3/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

# Odometria
# No Fortress v6, OdometryPublisher publica em odometry_with_covariance (não em odom).
- ros_topic_name: "odom"
  gz_topic_name: "/model/rosmaster_x3/odometry_with_covariance"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.OdometryWithCovariance"
  direction: GZ_TO_ROS

# TF odom→base_footprint — publicado pelo OdometryPublisher como gz.msgs.Pose_V.
# O nó rbd_odom_tf (rbd_gz_x3_launch.py) lê /odom e publica o TF via TransformBroadcaster.
#
# PLANO B2 — bridge directo do TF (descomentar se rbd_odom_tf não funcionar):
# Verificar primeiro com: ign topic -l | grep tf
# O tópico Gazebo pode ser /model/rosmaster_x3/tf ou /world/<world>/model/rosmaster_x3/tf
#
# - ros_topic_name: "/tf"
#   gz_topic_name: "/model/rosmaster_x3/tf"
#   ros_type_name: "tf2_msgs/msg/TFMessage"
#   gz_type_name: "gz.msgs.Pose_V"
#   direction: GZ_TO_ROS

# Comando de velocidade → VelocityControl subscrito em /model/rosmaster_x3/cmd_vel
- ros_topic_name: "cmd_vel"
  gz_topic_name: "/model/rosmaster_x3/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# IMU — publicado em /imu/data_raw para compatibilidade com imu_filter_madgwick
- ros_topic_name: "imu/data_raw"
  gz_topic_name: "imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

# LiDAR
- ros_topic_name: "scan"
  gz_topic_name: "scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS
