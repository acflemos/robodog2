# imu_filter_param.yaml
# ======================
# Parâmetros do nó imu_filter_madgwick (pacote imu_filter_madgwick).
# Filtra /imu/data_raw → /imu/data (com campo orientation preenchido).
#
# Usado por: yahboomcar_bringup_X3_launch.py, R2 e X1
# Entrada:   /imu/data_raw (Imu sem orientation)
# Saída:     /imu/data     (Imu com orientation calculada pelo filtro Madgwick)
#
# O filtro Madgwick usa acelerómetro + giroscópio (e opcionalmente magnetómetro)
# para estimar a orientação 3D em quaternion.

imu_filter_madgwick:
    ros__parameters:
        fixed_frame: "base_link"   # frame de referência para o filtro
        use_mag: false             # não usar magnetómetro (evita interferências do chassis metálico)
        publish_tf: false          # TF odom→base_footprint publicado pelo EKF, não aqui
        world_frame: "enu"         # convenção East-North-Up (padrão ROS2)
        orientation_stddev: 0.05   # desvio-padrão da orientação estimada (covariância baixa)
